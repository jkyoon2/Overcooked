# configs/gen_bad_skills.yaml

# [Target Environment]
env_name: "Overcooked"
layout_name: "small_corridor"
algorithm_name: "hmarl"
experiment_name: "sp"
overcooked_version: "new"

# Training-time model hyperparams (match train_hmarl.sh)
cnn_layers_params: "32,3,1,1 64,3,1,1 32,3,1,1"
use_recurrent_policy: false
skill_dim: 4
t_seg: 5

agent_policy_names:
  - ppo
  - ppo

# [Bad Skill Generation Params]
bad_segment_pre: 3
bad_segment_post: 1
bad_skill_output: "results/bad_skills/small_corridor_bad_skills_onion_counter_regrab.npy"

# [VAE Model Path]
vae_checkpoint_path: "/home/juliecandoit98/neurocontroller/checkpoints/vae_epoch_005_1t_small_corridor_4d.pt"

# [Policy Loading Strategy]
# Multi-run: seed list + checkpoint range (range 안의 모든 체크포인트)
load_seeds: [9]
load_step_start: 2000000
load_step_end: 5200000

# Single-run examples (필요시 주석 해제)
# load_seeds: [10]
# load_steps: [4020000]

# Cross-Play (서로 다른 시드, 다른 스텝)
# load_seeds: [1, 2]
# load_steps: [30000, 40000]

# [Execution Params]
num_agents: 2
n_rollout_threads: 1
episode_length: 400
num_episodes: 10
use_render: true
cuda: true
onion_regrab_window: 8
idle_backtrack_window: 3

# [Target Error Types]
# Only collect specified error types; comment out to collect all.
target_error_types:
  - "ONION_COUNTER_REGRAB"
# "ONION_COUNTER_REGRAB"
# "COLLISION"
# "IDLE_BACKTRACK"
