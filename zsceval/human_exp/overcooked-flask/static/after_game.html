<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <script src="../static/js/jquery-3.6.3.js"></script>
    <title>Final Survey / Debrief</title>
    <style>
        :root {
            --ink: #1f1a17;
            --paper: #f9f3ea;
            --accent: #8a3f2a;
            --line: rgba(31, 26, 23, 0.12);
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(138, 63, 42, 0.18), transparent 24%),
                radial-gradient(circle at bottom right, rgba(33, 82, 86, 0.14), transparent 26%),
                linear-gradient(135deg, #f0e7d8, #faf7f1 55%, #efe5d7);
            color: var(--ink);
            font-family: "Georgia", "Times New Roman", serif;
        }

        .shell {
            max-width: 940px;
            margin: 0 auto;
            padding: 40px 20px 70px;
        }

        .hero,
        .panel {
            padding: 28px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.94);
            box-shadow: 0 18px 40px rgba(54, 38, 29, 0.08);
        }

        .hero {
            margin-bottom: 24px;
        }

        .panel {
            margin-bottom: 18px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .field textarea {
            width: 100%;
            min-height: 110px;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: #fffdfa;
            resize: vertical;
        }

        .scale-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .scale-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fffaf2;
            font-weight: 500;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .primary-btn {
            border: 0;
            border-radius: 999px;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="shell">
        <section class="hero">
            <p style="margin:0 0 8px; font-size:0.95rem; letter-spacing:0.08em; text-transform:uppercase; color:#8a3f2a; font-weight:700;">Steps 11-12</p>
            <h1>Final Post Hoc Survey</h1>
            <p>Record the participant's overall impressions, then use the free-response section for debrief or interview notes.</p>
        </section>

        <section class="panel">
            <h3>Final Ratings</h3>
            <div id="rating-questions"></div>
        </section>

        <section class="panel">
            <h3>Debrief / Interview Notes</h3>
            <div class="field">
                <label for="takeaway">What strategy did the participant use to anticipate the AI?</label>
                <textarea id="takeaway"></textarea>
            </div>
            <div class="field">
                <label for="surprise_patterns">What kinds of moments were consistently surprising?</label>
                <textarea id="surprise_patterns"></textarea>
            </div>
            <div class="field">
                <label for="researcher_notes">Researcher notes</label>
                <textarea id="researcher_notes"></textarea>
            </div>
        </section>

        <div class="actions">
            <button class="primary-btn" id="submit-final" type="button">Save Final Survey</button>
        </div>
    </div>

    <script>
        var ratingQuestions = [
            { id: "predictability", label: "How predictable did the AI feel overall?" },
            { id: "teamwork", label: "How strong was the sense of teamwork with the AI?" },
            { id: "surprise", label: "How often did the AI behave in a surprising way?" },
            { id: "probe_usefulness", label: "How useful were the frozen probes for understanding the AI?" },
            { id: "eeg_comfort", label: "How comfortable was the EEG setup during the session?" }
        ];

        $(function () {
            renderRatings();
            $("#submit-final").click(submitFinal);
        });

        function renderRatings() {
            ratingQuestions.forEach(function (question) {
                var wrapper = $('<div class="field"></div>');
                wrapper.append("<label>" + question.label + "</label>");
                var group = $('<div class="scale-group"></div>');
                for (var i = 1; i <= 7; i++) {
                    group.append('<label><input type="radio" name="' + question.id + '" value="' + i + '"> ' + i + '</label>');
                }
                wrapper.append(group);
                $("#rating-questions").append(wrapper);
            });
        }

        function apiPost(url, payload) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, false);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify(payload));
            return xhr.responseText ? JSON.parse(xhr.responseText) : {};
        }

        function submitFinal() {
            var userInfo = JSON.parse(sessionStorage.getItem("before_game") || "{}");
            if (!userInfo.name) {
                window.location.href = "/html/before_game";
                return;
            }

            var ratings = {};
            var missing = [];
            ratingQuestions.forEach(function (question) {
                var value = $('input[name="' + question.id + '"]:checked').val();
                if (!value) {
                    missing.push(question.label);
                }
                ratings[question.id] = value || "";
            });

            if (missing.length) {
                alert("Please complete all rating questions.");
                return;
            }

            var payload = {
                final_ratings: ratings,
                debrief: {
                    takeaway: $("#takeaway").val(),
                    surprise_patterns: $("#surprise_patterns").val(),
                    researcher_notes: $("#researcher_notes").val()
                }
            };

            apiPost("/save_session_section", {
                user_info: userInfo,
                section_id: "final_posthoc_survey",
                data: payload,
                progress: {
                    current_stage_id: "session_complete",
                    completed_stage_ids: ["session_complete"]
                }
            });

            alert("Final survey saved. The session is complete.");
        }
    </script>
</body>

</html>
