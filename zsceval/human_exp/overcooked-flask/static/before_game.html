<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <script src="../static/js/jquery-3.6.3.js"></script>
    <script src="../static/js/popper.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <title>Arrival / Screening</title>
    <style>
        :root {
            --paper: #f4efe6;
            --ink: #1d271f;
            --accent: #b5502d;
            --accent-soft: #ead7c8;
            --line: #d3c6b7;
            --panel: rgba(255, 252, 246, 0.94);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(181, 80, 45, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(34, 82, 56, 0.14), transparent 32%),
                linear-gradient(135deg, #efe6d7, #f9f5ee 55%, #efe5d4);
            color: var(--ink);
            font-family: "Georgia", "Times New Roman", serif;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 64px;
        }

        .hero {
            margin-bottom: 28px;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 50px rgba(49, 37, 24, 0.08);
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p,
        .hero li {
            font-size: 1.02rem;
            line-height: 1.6;
        }

        .card-block {
            margin-bottom: 22px;
            padding: 24px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
        }

        .section-kicker {
            margin-bottom: 10px;
            color: var(--accent);
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .field input,
        .field textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fffdfa;
        }

        .field textarea {
            min-height: 110px;
            resize: vertical;
        }

        .option-list label {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 28px;
        }

        .primary-btn {
            border: 0;
            border-radius: 999px;
            padding: 14px 24px;
            font-weight: 700;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        .note {
            margin-top: 12px;
            color: #4b5f50;
            font-size: 0.92rem;
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="hero">
            <div class="section-kicker">Step 1</div>
            <h1 id="form-title">Arrival / Consent / Screening</h1>
            <div id="form-description"></div>
            <p class="note">This page stores participant information locally for the study session and resumes the same participant record if the page is reopened.</p>
        </div>
        <form id="intake-form"></form>
        <div class="actions">
            <button class="primary-btn" id="submit-btn" type="button">Save And Continue</button>
        </div>
    </div>

    <script>
        var formConfig = null;

        $(function () {
            loadFormConfig();
            $("#submit-btn").click(submitForm);
        });

        function apiPost(url, payload) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, false);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(payload ? JSON.stringify(payload) : null);
            return xhr.responseText ? JSON.parse(xhr.responseText) : {};
        }

        function loadFormConfig() {
            formConfig = apiPost("/beforegame");
            $("#form-title").text(formConfig.title);
            (formConfig.description || []).forEach(function (line) {
                $("#form-description").append("<p>" + line + "</p>");
            });

            (formConfig.sections || []).forEach(function (section, sectionIndex) {
                var block = $('<section class="card-block"></section>');
                block.append('<div class="section-kicker">Section ' + (sectionIndex + 1) + '</div>');
                block.append("<h3>" + section.title + "</h3>");

                (section.fields || []).forEach(function (field) {
                    block.append(renderField(field));
                });

                $("#intake-form").append(block);
            });
        }

        function renderField(field) {
            var wrapper = $('<div class="field"></div>');
            wrapper.append('<label for="' + field.id + '">' + field.label + (field.required ? " *" : "") + '</label>');

            if (field.type === "radio") {
                var optionList = $('<div class="option-list"></div>');
                (field.options || []).forEach(function (option) {
                    optionList.append(
                        '<label><input type="radio" name="' + field.id + '" value="' + option.value + '"> <span>' + option.label + '</span></label>'
                    );
                });
                wrapper.append(optionList);
                return wrapper;
            }

            if (field.type === "textarea") {
                wrapper.append('<textarea id="' + field.id + '"></textarea>');
                return wrapper;
            }

            var attrs = [];
            attrs.push('id="' + field.id + '"');
            attrs.push('type="' + field.type + '"');
            if (field.min !== undefined) {
                attrs.push('min="' + field.min + '"');
            }
            if (field.max !== undefined) {
                attrs.push('max="' + field.max + '"');
            }
            wrapper.append("<input " + attrs.join(" ") + ">");
            return wrapper;
        }

        function collectValues() {
            var result = {};
            var missing = [];

            (formConfig.sections || []).forEach(function (section) {
                (section.fields || []).forEach(function (field) {
                    var value = "";
                    if (field.type === "radio") {
                        value = $('input[name="' + field.id + '"]:checked').val() || "";
                    } else {
                        value = $("#" + field.id).val() || "";
                    }

                    if (field.required && String(value).trim() === "") {
                        missing.push(field.label);
                    }
                    result[field.id] = value;
                });
            });

            if (missing.length) {
                alert("Please complete: \n- " + missing.join("\n- "));
                return null;
            }
            return result;
        }

        function submitForm() {
            var payload = collectValues();
            if (!payload) {
                return;
            }

            apiPost("/create_questionnaire_before_game", payload);
            sessionStorage.setItem("before_game", JSON.stringify(payload));
            sessionStorage.removeItem("eeg_runner_state");
            sessionStorage.removeItem("instructions_complete");
            window.location.href = "/html/instructions";
        }
    </script>
</body>

</html>
